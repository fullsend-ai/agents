name: Functional Tests

# PR-triggered functional tests use pull_request_target so fork PRs receive
# secrets.  Authorization runs in a separate gate job (base checkout only)
# before the test job checks out the PR head — same pattern as fullsend e2e.

permissions: {}

on:
  push:
    branches: [main]
    paths:
      - 'eval/**'
      - 'agents/**'
      - 'harness/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'env/**'
      - 'common/**'
      - 'policies/**'
      - 'skills/**'
      - 'plugins/**'
      - 'docs/**'
      - '.github/workflows/functional-tests.yml'
      - '.github/scripts/**'
      - 'config.yaml'
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  merge_group:
  workflow_dispatch:

concurrency:
  group: >-
    ${{ github.event_name == 'pull_request_target'
        && format('functional-{0}', github.event.pull_request.number)
        || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: >-
    ${{ github.event_name == 'pull_request_target'
        || github.ref != 'refs/heads/main' }}

jobs:
  gate:
    # Separate job so pull-requests: write stays out of the job that checks
    # out fork head and runs tests with secrets.
    # Never checkout github.event.pull_request.head.sha here.
    if: >-
      github.event_name == 'pull_request_target' &&
      (github.event.action != 'labeled' || github.event.label.name == 'ok-to-test')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorized: ${{ steps.auth.outputs.authorized }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}  # Base branch only — never checkout PR head in gate

      - name: Check PR authorization
        id: auth
        uses: ./.github/actions/check-e2e-authorization
        with:
          pr_number: ${{ github.event.pull_request.number }}
          repository: ${{ github.repository }}
          pr_updated_at: ${{ github.event.pull_request.updated_at }}
          event_action: ${{ github.event.action }}
          pr_author_association: ${{ github.event.pull_request.author_association }}
          pr_author_login: ${{ github.event.pull_request.user.login }}

  # ---------------------------------------------------------------------------
  # Detect which agents need functional testing based on changed files.
  # Lightweight job: checkout + yq + select-eval-agents.sh → JSON array.
  # ---------------------------------------------------------------------------
  detect:
    needs: gate
    if: >-
      !cancelled() &&
      (github.event_name != 'pull_request_target' || needs.gate.outputs.authorized == 'true')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      agents: ${{ steps.agents.outputs.agents }}
    steps:
      - name: Get changed files
        id: changes
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          MERGE_GROUP_BASE: ${{ github.event.merge_group.base_sha }}
          MERGE_GROUP_HEAD: ${{ github.event.merge_group.head_sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          if [ "$EVENT_NAME" = "merge_group" ]; then
            FILES=$(gh api "repos/${REPO}/compare/${MERGE_GROUP_BASE}...${MERGE_GROUP_HEAD}" --jq '.files[].filename') || {
              echo "::warning::Failed to fetch merge group files — running all functional tests as a precaution"
              exit 0
            }
            FILE_COUNT=$(echo "$FILES" | wc -l)
            if [ "$FILE_COUNT" -ge 300 ]; then
              echo "::warning::Compare API returned $FILE_COUNT files (possible truncation at 300) — running all functional tests as a precaution"
              exit 0
            fi
          elif [ "$EVENT_NAME" = "push" ]; then
            FILES=$(gh api "repos/${REPO}/compare/${PUSH_BEFORE}...${PUSH_AFTER}" --jq '.files[].filename') || {
              echo "::warning::Failed to fetch push diff — running all functional tests as a precaution"
              exit 0
            }
            FILE_COUNT=$(echo "$FILES" | wc -l)
            if [ "$FILE_COUNT" -ge 300 ]; then
              echo "::warning::Push diff returned $FILE_COUNT files (possible truncation at 300) — running all functional tests as a precaution"
              exit 0
            fi
          else
            FILES=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename') || {
              echo "::warning::Failed to fetch PR files — running all functional tests as a precaution"
              exit 0
            }
            FILE_COUNT=$(echo "$FILES" | wc -l)
            if [ "$FILE_COUNT" -ge 300 ]; then
              echo "::warning::PR file list returned $FILE_COUNT files (possible truncation) — running all functional tests as a precaution"
              exit 0
            fi
          fi
          DELIM="ghadelim_$(openssl rand -hex 8)"
          {
            echo "files<<${DELIM}"
            echo "$FILES"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}

      - name: Install yq
        run: |
          curl -sSfL "https://github.com/mikefarah/yq/releases/download/v4.47.1/yq_linux_amd64" -o /usr/local/bin/yq
          echo "0fb28c6680193c41b364193d0c0fc4a03177aecde51cfc04d506b1517158c2fb  /usr/local/bin/yq" | sha256sum -c
          chmod +x /usr/local/bin/yq

      - name: Select eval agents
        id: agents
        env:
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
        run: |
          if [ -n "$CHANGED_FILES" ]; then
            AGENTS=$(echo "$CHANGED_FILES" | bash .github/scripts/select-eval-agents.sh)
          else
            # workflow_dispatch: run all agents with eval configs
            AGENTS=$(for d in eval/*/eval.yaml; do basename "$(dirname "$d")"; done)
          fi
          JSON=$(echo "$AGENTS" | jq -Rsc '[split("\n")[] | select(length > 0)]')
          echo "agents=$JSON" >> "$GITHUB_OUTPUT"
          echo "Selected agents: $JSON"

  # ---------------------------------------------------------------------------
  # Run functional tests — one matrix leg per agent, in parallel.
  # Each leg does full setup (python, fullsend, podman, etc.) independently.
  # ---------------------------------------------------------------------------
  functional-tests:
    needs: [gate, detect]
    if: >-
      !cancelled() &&
      needs.detect.outputs.agents != '[]' &&
      (github.event_name != 'pull_request_target' || needs.gate.outputs.authorized == 'true')
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJSON(needs.detect.outputs.agents) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}
          submodules: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Install agent-eval-harness
        run: uv pip install --system -e 'eval/.agent-eval-harness[anthropic]'

      - name: Install yq
        run: |
          curl -sSfL "https://github.com/mikefarah/yq/releases/download/v4.47.1/yq_linux_amd64" -o /usr/local/bin/yq
          echo "0fb28c6680193c41b364193d0c0fc4a03177aecde51cfc04d506b1517158c2fb  /usr/local/bin/yq" | sha256sum -c
          chmod +x /usr/local/bin/yq

      - name: Configure git identity
        run: |
          git config --global user.name "fullsend-eval[bot]"
          git config --global user.email "fullsend-eval[bot]@users.noreply.github.com"

      - name: Install fullsend
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FULLSEND_VERSION="${FULLSEND_VERSION:-latest}"
          if [ "$FULLSEND_VERSION" = "latest" ]; then
            FULLSEND_VERSION=$(gh release view --repo fullsend-ai/fullsend --json tagName -q .tagName)
          fi
          if [ -z "$FULLSEND_VERSION" ]; then
            echo "::error::Failed to resolve fullsend version"
            exit 1
          fi
          { echo 'FULLSEND_VERSION<<GHEOF'; echo "${FULLSEND_VERSION}"; echo 'GHEOF'; } >> "$GITHUB_ENV"
          VERSION_NUM="${FULLSEND_VERSION#v}"
          TARBALL="fullsend_${VERSION_NUM}_linux_amd64.tar.gz"
          gh release download "$FULLSEND_VERSION" \
            --repo fullsend-ai/fullsend \
            --pattern "$TARBALL" \
            --dir /tmp
          tar xzf "/tmp/${TARBALL}" -C /usr/local/bin fullsend
          chmod +x /usr/local/bin/fullsend
          fullsend --version

      - name: Configure OpenShell gateway
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          eval "$(gh api "repos/fullsend-ai/fullsend/contents/.github/scripts/openshell-version.sh?ref=${FULLSEND_VERSION}" --jq .content | base64 -d | grep -E '^OPENSHELL_(VERSION|SHA)=')"
          if [ -z "$OPENSHELL_VERSION" ] || [ -z "$OPENSHELL_SHA" ]; then
            SAFE_VERSION=$(echo "$FULLSEND_VERSION" | tr -d '\n\r' | sed -e 's/%0[aAdD]//g' -e 's/::/: :/g')
            echo "::error::Failed to resolve OpenShell version from fullsend tag ${SAFE_VERSION}"
            exit 1
          fi
          echo "OPENSHELL_VERSION=${OPENSHELL_VERSION}" >> "$GITHUB_ENV"
          echo "OPENSHELL_SHA=${OPENSHELL_SHA}" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.config/openshell"
          echo "OPENSHELL_BIND_ADDRESS=0.0.0.0" > "$HOME/.config/openshell/gateway.env"
          cat > "$HOME/.config/openshell/gateway.toml" << EOF
          [openshell]
          version = 1

          [openshell.gateway]
          supervisor_image = "ghcr.io/nvidia/openshell/supervisor:${OPENSHELL_VERSION}"
          EOF

      - name: Install OpenShell CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SCRIPT_DIR="$(mktemp -d)"
          gh api "repos/fullsend-ai/fullsend/contents/.github/scripts/install-openshell.sh?ref=${FULLSEND_VERSION}" --jq .content | base64 -d > "${SCRIPT_DIR}/install-openshell.sh"
          gh api "repos/fullsend-ai/fullsend/contents/.github/scripts/openshell-version.sh?ref=${FULLSEND_VERSION}" --jq .content | base64 -d > "${SCRIPT_DIR}/openshell-version.sh"
          chmod +x "${SCRIPT_DIR}/install-openshell.sh"
          "${SCRIPT_DIR}/install-openshell.sh"

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Configure rootless Podman
        run: |
          whoami_user="$(whoami)"
          grep -q "^${whoami_user}:" /etc/subuid || sudo usermod --add-subuids 100000-165535 --add-subgids 100000-165535 "${whoami_user}"
          podman system migrate

      - name: Start Podman API service
        run: |
          SOCKET_PATH="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/podman/podman.sock"
          if [ ! -S "${SOCKET_PATH}" ]; then
            mkdir -p "$(dirname "${SOCKET_PATH}")"
            podman system service --time=0 "unix://${SOCKET_PATH}" &
            for _i in $(seq 1 30); do
              [ -S "${SOCKET_PATH}" ] && podman --url "unix://${SOCKET_PATH}" info >/dev/null 2>&1 && break
              sleep 1
            done
            [ -S "${SOCKET_PATH}" ] || { echo "::error::Podman socket not ready"; exit 1; }
          fi

      - name: Install validation dependencies
        run: pip install --quiet "jsonschema>=4.18.0"

      - name: Check for secrets
        id: secrets-check
        run: |
          if [ -z "$WIF_PROVIDER" ]; then
            echo "::warning::GCP secrets are not configured. Skipping functional tests."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          WIF_PROVIDER: ${{ secrets.E2E_GCP_WIF_PROVIDER }}

      - name: Authenticate to GCP
        if: steps.secrets-check.outputs.available == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.E2E_GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.E2E_GCP_SERVICE_ACCOUNT }}

      - name: Prepare sandbox credentials
        if: steps.secrets-check.outputs.available == 'true'
        run: |
          echo "HOST_GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS" >> "$GITHUB_ENV"
          if [[ -f scripts/prepare-sandbox-credentials.sh ]]; then
            bash scripts/prepare-sandbox-credentials.sh
          fi

      - name: Run functional tests
        if: steps.secrets-check.outputs.available == 'true'
        env:
          EVAL_ORG: ${{ vars.EVAL_ORG }}
          GH_TOKEN: ${{ secrets.EVAL_GH_TOKEN }}
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ vars.EVALS_VERTEX_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.E2E_GCP_PROJECT_ID }}
          CLOUD_ML_REGION: ${{ vars.EVALS_GCP_REGION }}
          EVALS_HOST_CREDENTIALS: ${{ env.HOST_GOOGLE_APPLICATION_CREDENTIALS }}
          FULLSEND_DIR: ${{ github.workspace }}
          AGENT: ${{ matrix.agent }}
        run: ./eval/run-functional.sh "$AGENT"

      # Protected-path change (human review required): scrub eval artifacts before
      # upload so ::add-mask:: values (EVAL_GH_TOKEN) are not archived. See PR #184.
      - name: Scrub secrets from eval results
        id: scrub-eval-results
        if: always() && steps.secrets-check.outputs.available == 'true'
        run: bash eval/scripts/scrub-eval-results.sh eval/runs /tmp/agent-eval

      # Upload only when scrub succeeded — never publish if live secrets remain.
      - name: Upload eval results
        if: >-
          always()
          && steps.secrets-check.outputs.available == 'true'
          && steps.scrub-eval-results.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-results-${{ matrix.agent }}
          path: |
            eval/runs/
            !eval/runs/**/.eval-env
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Roll-up job with a stable name for branch protection required checks.
  # Require "functional-tests-complete" in repo settings — it handles all
  # dynamic matrix shapes including empty (no agents to test).
  # ---------------------------------------------------------------------------
  functional-tests-complete:
    needs: [gate, detect, functional-tests]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: Check results
        env:
          EVENT_NAME: ${{ github.event_name }}
          GATE_RESULT: ${{ needs.gate.result }}
          DETECT_RESULT: ${{ needs.detect.result }}
          TESTS_RESULT: ${{ needs.functional-tests.result }}
        run: |
          if [ "$EVENT_NAME" = "pull_request_target" ] && [ "$DETECT_RESULT" = "skipped" ]; then
            echo "::error::Detect was skipped on pull_request_target — tests were not authorized to run"
            exit 1
          fi
          if [ "$GATE_RESULT" = "failure" ] || [ "$GATE_RESULT" = "cancelled" ]; then
            echo "::error::Gate job ${GATE_RESULT}"
            exit 1
          fi
          if [ "$DETECT_RESULT" = "failure" ] || [ "$DETECT_RESULT" = "cancelled" ]; then
            echo "::error::Detect job ${DETECT_RESULT}"
            exit 1
          fi
          if [ "$TESTS_RESULT" = "failure" ] || [ "$TESTS_RESULT" = "cancelled" ]; then
            echo "::error::One or more functional tests ${TESTS_RESULT}"
            exit 1
          fi
