name: code-eval
description: Functional test of the fullsend code agent pipeline

skill: code

execution:
  mode: case
  timeout: 2400  # 40 min — agent timeout is 35 min, plus setup/teardown
  parallelism: 2
  env:
    EVAL_ORG: $EVAL_ORG
    GH_TOKEN: $GH_TOKEN
    FULLSEND_DIR: $FULLSEND_DIR
    GOOGLE_APPLICATION_CREDENTIALS: $GOOGLE_APPLICATION_CREDENTIALS
    ANTHROPIC_VERTEX_PROJECT_ID: $ANTHROPIC_VERTEX_PROJECT_ID
    GOOGLE_CLOUD_PROJECT: $GOOGLE_CLOUD_PROJECT
    CLOUD_ML_REGION: $CLOUD_ML_REGION

hooks:
  before_each:
    - command: "setup-fixture.sh"
      timeout: 120
      description: "Create ephemeral repo and fixture issue"

  after_each:
    - command: "capture-fixture.sh"
      timeout: 30
      description: "Capture fixture state for judges"
    - command: "teardown-fixture.sh"
      timeout: 30
      on_failure: continue
      description: "Delete ephemeral repo"

runner:
  type: cli
  command:
    - "run-fullsend.sh"
    - "{agent}"
    - "{workspace}"
    - "{output_dir}"
  env:
    FULLSEND_DIR: $FULLSEND_DIR
    GH_TOKEN: $GH_TOKEN
    GOOGLE_APPLICATION_CREDENTIALS: $GOOGLE_APPLICATION_CREDENTIALS
    ANTHROPIC_VERTEX_PROJECT_ID: $ANTHROPIC_VERTEX_PROJECT_ID
    GOOGLE_CLOUD_PROJECT: $GOOGLE_CLOUD_PROJECT
    CLOUD_ML_REGION: $CLOUD_ML_REGION

models:
  skill: claude-opus-4-6
  judge: claude-opus-4-6

dataset:
  path: cases
  schema: |
    Each case directory contains:
    - input.yaml: Fixture definition with forge, fixture type (issue), title, and body.
    - annotations.yaml: Expected behavior, budgets, and LLM rubric.
    - repo/: Directory with the git repo contents the agent sees.

outputs:
  - path: output
    schema: |
      fixture-state.json: Captured state of the GitHub issue after the full
      agent pipeline (pre-script, agent, post-script) has run. Contains:
      state, labels, comments, assignees. The post-script's comment on the
      issue indicates whether the PR was successfully created.
      metrics.json: Agent execution metrics (num_turns, total_cost_usd).

# ---------------------------------------------------------------------------
# Judges
# ---------------------------------------------------------------------------
judges:
  - name: code_quality
    description: |
      Evaluate the overall quality of the code agent's work — did it produce
      a correct, minimal fix that addresses the issue?
    prompt: |
      You are evaluating a code agent's work on a GitHub issue.

      The agent was given a bug report filed against a repo. It read the
      issue, examined the source code, implemented a fix, ran tests, and
      committed the result. A post-script then pushed the branch and
      created a PR.

      Here is the captured state of the issue after the full pipeline ran:
      {{ outputs }}

      Here is what the test case author expects from a good implementation:
      {{ annotations }}

      Evaluate the quality of the code agent's work on a 1-5 scale:

      1 = No fix attempted, or fix is fundamentally wrong
      2 = Fix attempted but incorrect — introduces new bugs, misidentifies
          the root cause, or breaks existing functionality
      3 = Adequate — correct fix that resolves the issue, but may include
          unnecessary changes, miss edge cases, or lack test coverage
      4 = Good — correct and minimal fix, addresses edge cases mentioned in
          the issue, includes appropriate test changes
      5 = Excellent — all of the above, plus the commit message and PR
          description clearly explain the change

      Use the code_expectations field in the annotations as your rubric
      for what a strong implementation should look like. Score based on
      how well the agent met those expectations.

      Respond with just a number 1-5.

  - name: required_labels
    description: Required labels from annotations.yaml must be present on the issue
    check: |
      import json
      state = json.loads(outputs["files"]["output/fixture-state.json"])
      actual = [l.lower() for l in state.get("labels", [])]
      required = outputs.get("annotations", {}).get("labels", {}).get("required", [])
      if not required:
          return True, "No required labels specified"
      missing = [l for l in required if l.lower() not in actual]
      if missing:
          return False, f"Missing labels: {missing} (actual: {actual})"
      return True, f"All required labels present: {required}"

  - name: forbidden_labels
    description: Labels listed in annotations.yaml forbidden list must NOT be present
    check: |
      import json
      state = json.loads(outputs["files"]["output/fixture-state.json"])
      actual = [l.lower() for l in state.get("labels", [])]
      forbidden = outputs.get("annotations", {}).get("labels", {}).get("forbidden", [])
      if not forbidden:
          return True, "No forbidden labels specified"
      present = [l for l in forbidden if l.lower() in actual]
      if present:
          return False, f"Forbidden labels present: {present} (actual: {actual})"
      return True, f"No forbidden labels found (checked: {forbidden})"

  - name: max_turns
    description: Agent must complete within the declared turn budget
    check: |
      import json
      raw = outputs["files"].get("output/metrics.json")
      if not raw:
          return False, "metrics.json not found"
      metrics = json.loads(raw)
      actual = metrics.get("num_turns")
      if actual is None:
          return False, "num_turns not present in metrics.json"
      limit = outputs.get("annotations", {}).get("max_turns")
      if limit is None:
          return False, "max_turns not declared in annotations.yaml"
      if int(actual) > int(limit):
          return False, f"Exceeded max_turns: {actual} > {limit}"
      return True, f"Turns OK: {actual} <= {limit}"

  - name: max_cost
    description: Agent must complete within the declared cost budget
    check: |
      import json
      raw = outputs["files"].get("output/metrics.json")
      if not raw:
          return False, "metrics.json not found"
      metrics = json.loads(raw)
      actual = metrics.get("total_cost_usd")
      if actual is None:
          return False, "total_cost_usd not present in metrics.json"
      limit = outputs.get("annotations", {}).get("max_cost_usd")
      if limit is None:
          return False, "max_cost_usd not declared in annotations.yaml"
      if float(actual) > float(limit):
          return False, f"Exceeded max_cost_usd: {actual} > {limit}"
      return True, f"Cost OK: {actual} <= {limit}"

# ---------------------------------------------------------------------------
# Thresholds
# ---------------------------------------------------------------------------
thresholds:
  code_quality:
    min_mean: 3.0
  required_labels:
    min_pass_rate: 1.0
  forbidden_labels:
    min_pass_rate: 1.0
  max_turns:
    min_pass_rate: 1.0
  max_cost:
    min_pass_rate: 1.0
