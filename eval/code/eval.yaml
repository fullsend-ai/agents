name: code-eval
description: Functional test of the fullsend code agent pipeline

skill: code

execution:
  mode: case
  timeout: 2400  # 40 min — agent timeout is 35 min, plus setup/teardown
  parallelism: 2
  env:
    EVAL_ORG: $EVAL_ORG
    GH_TOKEN: $GH_TOKEN
    FULLSEND_DIR: $FULLSEND_DIR
    GOOGLE_APPLICATION_CREDENTIALS: $GOOGLE_APPLICATION_CREDENTIALS
    ANTHROPIC_VERTEX_PROJECT_ID: $ANTHROPIC_VERTEX_PROJECT_ID
    GOOGLE_CLOUD_PROJECT: $GOOGLE_CLOUD_PROJECT
    CLOUD_ML_REGION: $CLOUD_ML_REGION

hooks:
  before_each:
    - command: "setup-fixture.sh"
      timeout: 120
      description: "Create ephemeral repo and fixture issue"

  after_each:
    - command: "capture-fixture.sh"
      timeout: 30
      description: "Capture issue state for judges"
    - command: "capture-code-output.sh"
      timeout: 60
      description: "Capture PR state and diff for code quality judge"
    - command: "teardown-fixture.sh"
      timeout: 30
      on_failure: continue
      description: "Delete ephemeral repo"

runner:
  type: cli
  command:
    - "run-fullsend.sh"
    - "{agent}"
    - "{workspace}"
    - "{output_dir}"
  env:
    FULLSEND_DIR: $FULLSEND_DIR
    GH_TOKEN: $GH_TOKEN
    GOOGLE_APPLICATION_CREDENTIALS: $GOOGLE_APPLICATION_CREDENTIALS
    ANTHROPIC_VERTEX_PROJECT_ID: $ANTHROPIC_VERTEX_PROJECT_ID
    GOOGLE_CLOUD_PROJECT: $GOOGLE_CLOUD_PROJECT
    CLOUD_ML_REGION: $CLOUD_ML_REGION

models:
  skill: claude-opus-4-6
  judge: claude-opus-4-6

dataset:
  path: cases
  schema: |
    Each case directory contains:
    - input.yaml: Issue definition with forge, fixture type, title, body, and labels.
    - annotations.yaml: Expected behavior (PR created, code quality rubric, budgets).
    - repo/: Directory with the git repo contents the agent examines and fixes.

outputs:
  - path: output
    schema: |
      fixture-state.json: Captured state of the GitHub issue after the
      full agent pipeline (pre-script, agent, post-script) has run.
      pr-state.json: Captured state of the PR created by the post-script,
      including diff, changed file count, and branch info.
      metrics.json: Agent execution metrics (turns, cost, tokens).

# ---------------------------------------------------------------------------
# Judges
# ---------------------------------------------------------------------------
judges:
  - name: pr_created
    description: The code agent must produce a commit that the post-script turns into a PR
    check: |
      import json
      pr_raw = outputs["files"].get("output/pr-state.json")
      if not pr_raw:
          return False, "pr-state.json not found — capture hook may have failed"
      pr = json.loads(pr_raw)
      if pr.get("error"):
          return False, f"No PR created: {pr['error']}"
      if not pr.get("number"):
          return False, "PR state has no number — PR creation may have failed"
      return True, f"PR #{pr['number']} created: {pr.get('title', 'untitled')}"

  - name: code_quality
    description: |
      Evaluate the quality of the code change — did the agent correctly
      identify the bug, produce a minimal and correct fix, and verify
      it with tests?
    prompt: |
      You are evaluating a code agent's work on a GitHub issue. The agent
      was given an issue filed against a small repository, and ran a full
      implementation pipeline: it read the issue and source code, identified
      what needed to change, implemented the fix or feature, and committed
      to a feature branch. A post-script then pushed the branch and
      created a PR.

      Here is the captured state of the PR the agent created, including
      the full diff:
      {{ outputs }}

      Here is what the test case author expects from a good implementation:
      {{ annotations }}

      Evaluate the quality of the implementation on a 1-5 scale:

      1 = Wrong change or fundamentally misunderstood the issue
      2 = Change addresses the symptom but not the root cause, or
          introduces new issues
      3 = Adequate — correct change, but sloppy (unnecessary edits, extra
          files modified, poor placement or formatting)
      4 = Good — correct minimal change, clean diff, meets expectations
      5 = Excellent — minimal correct change, clean commit message
          referencing the issue, no scope creep, nothing extraneous

      Use the code_expectations field in the annotations as your rubric.
      Respond with just a number 1-5.

  - name: forbidden_labels
    description: Labels listed in annotations.yaml forbidden list must NOT be present
    check: |
      import json
      state = json.loads(outputs["files"]["output/fixture-state.json"])
      actual = [l.lower() for l in state.get("labels", [])]
      forbidden = outputs.get("annotations", {}).get("labels", {}).get("forbidden", [])
      if not forbidden:
          return True, "No forbidden labels specified"
      present = [l for l in forbidden if l.lower() in actual]
      if present:
          return False, f"Forbidden labels present: {present} (actual: {actual})"
      return True, f"No forbidden labels found (checked: {forbidden})"

  - name: max_turns
    description: Agent must complete within the declared turn budget
    check: |
      import json
      raw = outputs["files"].get("output/metrics.json")
      if not raw:
          return False, "metrics.json not found"
      metrics = json.loads(raw)
      actual = metrics.get("num_turns")
      if actual is None:
          return False, "num_turns not present in metrics.json"
      limit = outputs.get("annotations", {}).get("max_turns")
      if limit is None:
          return False, "max_turns not declared in annotations.yaml"
      if int(actual) > int(limit):
          return False, f"Exceeded max_turns: {actual} > {limit}"
      return True, f"Turns OK: {actual} <= {limit}"

  - name: max_cost
    description: Agent must complete within the declared cost budget
    check: |
      import json
      raw = outputs["files"].get("output/metrics.json")
      if not raw:
          return False, "metrics.json not found"
      metrics = json.loads(raw)
      actual = metrics.get("total_cost_usd")
      if actual is None:
          return False, "total_cost_usd not present in metrics.json"
      limit = outputs.get("annotations", {}).get("max_cost_usd")
      if limit is None:
          return False, "max_cost_usd not declared in annotations.yaml"
      if float(actual) > float(limit):
          return False, f"Exceeded max_cost_usd: {actual} > {limit}"
      return True, f"Cost OK: {actual} <= {limit}"

# ---------------------------------------------------------------------------
# Thresholds
# ---------------------------------------------------------------------------
thresholds:
  pr_created:
    min_pass_rate: 1.0
  code_quality:
    min_mean: 3.0
  forbidden_labels:
    min_pass_rate: 1.0
  max_turns:
    min_pass_rate: 1.0
  max_cost:
    min_pass_rate: 1.0
