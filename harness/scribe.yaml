---
agent: agents/scribe.md
doc: docs/scribe.md
model: opus
image: ghcr.io/fullsend-ai/fullsend-sandbox:latest
policy: policies/base.yaml
allowed_remote_resources:
  - "https://raw.githubusercontent.com/fullsend-ai/agents/"
openshell:
  profiles:
    - "https://raw.githubusercontent.com/fullsend-ai/agents/refs/pull/211/head/profiles/fullsend-vertex-ai.yaml#sha256=347b2d794aef43e87a3e98331321ce90e3745d8e06627e4f64490d23407adcb6"
providers:
  - "https://raw.githubusercontent.com/fullsend-ai/agents/refs/pull/211/head/providers/vertex-ai.yaml#sha256=ae5ebe527e5d7b0fa6994346fde3f6ba11b632a3ba78ece96591b5ed85083ec1"

role: scribe
slug: fullsend-ai-scribe

host_files:
  - src: env/gcp-vertex.env
    dest: /sandbox/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/.gcp-credentials.json
  - src: ${GCP_OIDC_TOKEN_FILE}
    dest: /sandbox/workspace/.gcp-oidc-token
    optional: true
  - src: ${RUNNER_TEMP}/scribe-workspace/notes.tar.gz
    dest: /sandbox/workspace/notes.tar.gz
  - src: ${RUNNER_TEMP}/scribe-workspace/backlog.json
    dest: /sandbox/workspace/backlog.json
  - src: ${RUNNER_TEMP}/scribe-workspace/closed-issues.json
    dest: /sandbox/workspace/closed-issues.json
  - src: ${RUNNER_TEMP}/scribe-workspace/open-prs.json
    dest: /sandbox/workspace/open-prs.json
  - src: ${RUNNER_TEMP}/scribe-workspace/repo-docs-index.json
    dest: /sandbox/workspace/repo-docs-index.json
  - src: ${RUNNER_TEMP}/scribe-workspace/scribe-meta.json
    dest: /sandbox/workspace/scribe-meta.json

skills: []

pre_script: scripts/pre-scribe.sh
post_script: scripts/post-scribe.sh

validation_loop:
  script: scripts/validate-output-schema.sh
  schema: schemas/scribe-result.schema.json
  max_iterations: 2

env:
  runner:
    SCRIBE_REPO: ${SCRIBE_REPO}
    SCRIBE_SEARCH_QUERY: ${SCRIBE_SEARCH_QUERY}
    SCRIBE_LOOKBACK_HOURS: ${SCRIBE_LOOKBACK_HOURS}
    SCRIBE_DRY_RUN: ${SCRIBE_DRY_RUN}
    SCRIBE_MIN_CONFIDENCE: ${SCRIBE_MIN_CONFIDENCE}
    SCRIBE_MODE: ${SCRIBE_MODE}
    SCRIBE_SLACK_WEBHOOK_URL: ${SCRIBE_SLACK_WEBHOOK_URL}
    GH_TOKEN: ${GH_TOKEN}
    CONTENTS_TOKEN: ${CONTENTS_TOKEN}
  sandbox:
    SCRIBE_REPO: "${SCRIBE_REPO}"
    SCRIBE_SEARCH_QUERY: "${SCRIBE_SEARCH_QUERY}"
    SCRIBE_LOOKBACK_HOURS: "${SCRIBE_LOOKBACK_HOURS}"
    SCRIBE_DRY_RUN: "${SCRIBE_DRY_RUN}"
    SCRIBE_MIN_CONFIDENCE: "${SCRIBE_MIN_CONFIDENCE}"
    SCRIBE_MODE: "${SCRIBE_MODE}"

timeout_minutes: 15
